<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ 云南6天5晚自驾游 - 交互式地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
        }
        
        .header {
            background: linear-gradient(135deg, #1a3a5c 0%, #161b22 100%);
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .header .subtitle {
            color: #8b949e;
            font-size: 13px;
        }
        
        #map {
            width: 100%;
            height: calc(100vh - 180px);
            min-height: 500px;
        }
        
        .stats-bar {
            display: flex;
            background: #161b22;
            border-top: 1px solid #30363d;
        }
        .stat-item {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-right: 1px solid #30363d;
        }
        .stat-item:last-child { border: none; }
        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #3fb950;
        }
        .stat-label {
            font-size: 10px;
            color: #8b949e;
            margin-top: 4px;
        }
        
        .info-box {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: #161b22;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #30363d;
            display: none;
            z-index: 1000;
            max-height: 40vh;
            overflow-y: auto;
        }
        .info-box.active { display: block; }
        .info-box h3 {
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #30363d;
        }
        .info-box .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #30363d;
            border: none;
            color: #e6edf3;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }
        .info-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
        }
        .info-item .label {
            color: #8b949e;
            min-width: 60px;
        }
        
        .day-legend {
            position: fixed;
            top: 80px;
            right: 10px;
            background: #161b22;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #30363d;
            z-index: 1000;
            font-size: 12px;
        }
        .day-legend h4 {
            font-size: 12px;
            margin-bottom: 8px;
            color: #8b949e;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .leaflet-container { background: #0d1117; }
        .leaflet-popup-content-wrapper {
            background: #161b22;
            color: #e6edf3;
            border-radius: 12px;
        }
        .leaflet-popup-tip { background: #161b22; }
        .leaflet-popup-content { margin: 12px 16px; }
        
        .custom-popup .leaflet-popup-content-wrapper {
            background: #161b22;
            color: #e6edf3;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ 云南6天5晚自驾游</h1>
        <div class="subtitle">点击标记查看详细行程 | 拖拽缩放</div>
    </div>
    
    <div id="map"></div>
    
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value">1,300km</div>
            <div class="stat-label">总里程</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">6天</div>
            <div class="stat-label">游玩天数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">5晚</div>
            <div class="stat-label">住宿</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">¥16,400</div>
            <div class="stat-label">预算</div>
        </div>
    </div>
    
    <div class="day-legend">
        <h4>📍 途经地点</h4>
        <div class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> 昆明（出发/返回）</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f39c12"></span> 大理双廊</div>
        <div class="legend-item"><span class="legend-dot" style="background:#9b59b6"></span> 丽江古城</div>
        <div class="legend-item"><span class="legend-dot" style="background:#3498db"></span> 玉龙雪山</div>
    </div>
    
    <div class="info-box" id="infoBox">
        <button class="close-btn" onclick="closeInfo()">×</button>
        <h3 id="infoTitle">地点名称</h3>
        <div id="infoContent"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图
        var map = L.map('map').setView([26.0, 100.5], 7);
        
        // 深色地图
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap &copy; CARTO',
            maxZoom: 19
        }).addTo(map);
        
        // 地点数据
        var locations = [
            {
                name: "昆明长水机场",
                lat: 25.04,
                lng: 102.71,
                day: 1,
                icon: "🛫",
                color: "#3fb950",
                info: {
                    "日期": "4月4日 Day1",
                    "活动": "抵达昆明，取车出发",
                    "车程": "340km / 4h",
                    "餐饮": "云味楼过桥米线 ¥30",
                    "住宿": "大理双廊湖山云隐民宿"
                }
            },
            {
                name: "大理双廊",
                lat: 25.93,
                lng: 100.25,
                day: "1-2",
                icon: "🌊",
                color: "#f39c12",
                info: {
                    "日期": "4月4-5日 Day1-2",
                    "活动": "洱海日落、苍山索道、喜洲古镇",
                    "车程": "环海120km",
                    "餐饮": "巍山饵丝、吉祥红酸辣鱼",
                    "住宿": "大理双廊湖山云隐民宿 ¥300/晚",
                    "亮点": "苍山感通索道、海舌公园、双廊日落"
                }
            },
            {
                name: "苍山",
                lat: 25.97,
                lng: 100.10,
                day: 2,
                icon: "🏔️",
                color: "#f39c12",
                info: {
                    "日期": "4月5日 Day2",
                    "活动": "苍山感通索道",
                    "门票": "¥110 + 索道¥50",
                    "时长": "约3小时",
                    "建议": "早起出发，避开人流"
                }
            },
            {
                name: "喜洲古镇",
                lat: 26.01,
                lng: 100.18,
                day: 2,
                icon: "🏘️",
                color: "#f39c12",
                info: {
                    "日期": "4月5日 Day2",
                    "活动": "严家大院、海舌公园",
                    "门票": "严家大院 ¥25",
                    "美食": "喜洲破酥粑粑",
                    "拍照": "夫妻树、稻田咖啡"
                }
            },
            {
                name: "挖色小普陀",
                lat: 26.08,
                lng: 100.22,
                day: 2,
                icon: "📸",
                color: "#f39c12",
                info: {
                    "日期": "4月5日 Day2",
                    "活动": "洱海东岸自驾",
                    "打卡": "小普陀岛",
                    "风景": "洱海海鸥、悬崖日落"
                }
            },
            {
                name: "丽江古城",
                lat: 26.87,
                lng: 100.23,
                day: "3-5",
                icon: "🏯",
                color: "#9b59b6",
                info: {
                    "日期": "4月6-8日 Day3-5",
                    "活动": "古城漫游、束河、白沙",
                    "车程": "180km / 2.5h",
                    "住宿": "观景客栈 ¥250/晚",
                    "餐饮": "阿妈腊排骨、云雪丽餐厅",
                    "门票": "木府 ¥40"
                }
            },
            {
                name: "玉龙雪山",
                lat: 27.10,
                lng: 100.17,
                day: 4,
                icon: "⛰️",
                color: "#3498db",
                info: {
                    "日期": "4月7日 Day4",
                    "活动": "冰川公园登顶4680m",
                    "门票": "进山¥100 + 大索道¥140",
                    "耗时": "约6小时",
                    "必备": "氧气罐 ¥30、羽绒服",
                    "注意": "提前7天小程序抢票！"
                }
            },
            {
                name: "蓝月谷",
                lat: 27.05,
                lng: 100.22,
                day: 4,
                icon: "💧",
                color: "#3498db",
                info: {
                    "日期": "4月7日 Day4",
                    "活动": "小九寨蓝月谷",
                    "门票": "景区车 ¥50",
                    "风景": "碧蓝湖水、雪山倒影",
                    "建议": "下午顺光拍照最美"
                }
            },
            {
                name: "束河古镇",
                lat: 26.92,
                lng: 100.15,
                day: 5,
                icon: "🏘️",
                color: "#9b59b6",
                info: {
                    "日期": "4月8日 Day5",
                    "活动": "束河古镇漫游",
                    "特点": "比大研安静，纳西原生态",
                    "打卡": "四方街、九鼎龙潭",
                    "美食": "束河咖啡、纳西菜"
                }
            },
            {
                name: "白沙古镇",
                lat: 26.98,
                lng: 100.10,
                day: 5,
                icon: "🏔️",
                color: "#9b59b6",
                info: {
                    "日期": "4月8日 Day5",
                    "活动": "雪山脚下古镇",
                    "特色": "白沙壁画、纳西文化",
                    "打卡": "雪山观景台"
                }
            },
            {
                name: "昆明长水机场",
                lat: 25.04,
                lng: 102.71,
                day: 6,
                icon: "🛬",
                color: "#3fb950",
                info: {
                    "日期": "4月9日 Day6",
                    "活动": "丽江→昆明返程",
                    "车程": "500km / 6h",
                    "餐饮": "篆新农贸市场",
                    "还车": "机场店满油还车"
                }
            }
        ];
        
        // 路线点
        var routePoints = [
            [25.04, 102.71],   // 昆明
            [25.93, 100.25],  // 双廊
            [26.87, 100.23],  // 丽江
            [27.10, 100.17],  // 雪山
            [26.87, 100.23],  // 丽江
            [25.04, 102.71]   // 昆明
        ];
        
        // 画路线
        L.polyline(routePoints, {
            color: '#3fb950',
            weight: 3,
            dashArray: '10, 10',
            opacity: 0.7
        }).addTo(map);
        
        // 添加标记
        locations.forEach(function(loc) {
            var marker = L.marker([loc.lat, loc.lng], {
                icon: L.divIcon({
                    className: '',
                    html: '<div style="background:' + loc.color + ';width:24px;height:24px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;">' + loc.icon + '</div>',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                })
            }).addTo(map);
            
            // 绑定弹出
            var popupContent = '<div style="color:#333;"><strong>' + loc.icon + ' ' + loc.name + '</strong><br><span style="font-size:12px;">Day ' + loc.day + '</span><br><a href="#" onclick="showInfo(' + loc.lat + ',' + loc.lng + ')" style="color:#238636;font-size:12px;">查看详情 →</a></div>';
            marker.bindPopup(popupContent, {className: 'custom-popup'});
        });
        
        // 地图适应
        map.fitBounds(routePoints, {padding: [30, 30]});
        
        // 显示详情
        function showInfo(lat, lng) {
            var loc = locations.find(function(l) {
                return l.lat === lat && l.lng === lng;
            });
            
            if (loc) {
                document.getElementById('infoTitle').innerHTML = loc.icon + ' ' + loc.name;
                var content = '';
                for (var key in loc.info) {
                    content += '<div class="info-item"><span class="label">' + key + ':</span><span>' + loc.info[key] + '</span></div>';
                }
                document.getElementById('infoContent').innerHTML = content;
                document.getElementById('infoBox').classList.add('active');
                
                // 关闭 popup
                map.closePopup();
            }
        }
        
        function closeInfo() {
            document.getElementById('infoBox').classList.remove('active');
        }
        
        // 点击地图关闭详情
        map.on('click', function() {
            closeInfo();
        });
    </script>
</body>
</html>
